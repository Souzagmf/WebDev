<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>MD inc</title>
    <script src="https://kit.fontawesome.com/81060a8d32.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="container">
        <nav class="sidebar">
            <div class="nav-logo">
                <i class="fa-brands fa-spotify"></i>
            </div>
            <div class="nav-library">
                <i class="fa-solid fa-book"></i>
                <p>Sua Biblioteca</p>
            </div>
            <div class="nav-playlist">
                <h5>Crie sua Primeira Playlist</h5>
                <p>É facil, vamos te ajudar</p>
                <button>Criar Playlist</button>
            </div>
            <div class="nav-podcast">
                <h5>Que tal segui um podcast</h5>
                <p>Avisaremos você sobre nossos episódios</p>
                <button>Explore Podcast</button>
            </div>
            <div class="nav-footer">
                <a href="">Legal</a>
                <a href="">Centro de Privacidade</a>
                <a href="">Politica de Privacidade</a>
                <a href="">Cookies</a>
                <a href="">Sobre anúncios</a>
                <a href="">Acessibilidade</a>
            </div>
            <button class="nav-lang-button">
                <i class="fa-solid fa-earth-americas"></i>
                <span>Português do Brasil</span>
            </button>
        </nav>
        <main>
            <header>
                <i class="fa-brands fa-sistrix"></i>
                <input type="text" placeholder="O que você quer ouvir?">
            </header>
            <section class="content">
                <h2>Artistas Populares</h2>
                <div class="artist-grid">
                    <!-- INSERIR COM JS -->
                </div>
                <h2>Álbuns Populares</h2>
                <div class="albums-grid">
                    <!-- INSERIR COM JS -->
                </div>

            </section>
        </main>
    </div>
</body>
<script src="script.js"></script>

</html>
