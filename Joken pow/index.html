<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOKEN POW</title>
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <main>
        <div class="container">
            <div class="results hovertext">
                <div class="choices">
                    <span class="user-choice"><img src="./src/pedra.png" alt="user choice" ></span>
                    <span class="cpu-choice"><img src="./src/pedra.png" alt="cpu choice" ></span>
                </div>
                <p class="result-text">Let's Play!</p>
            </div>
            <div class="options">
                <span class="option-image">
                    <img src="./src/pedra.png" alt="user choice">
                    <p>Stone</p>
                </span>
                <span class="option-image">
                    <img src="./src/papel.png" alt="user choice">
                    <p>Paper</p>
                </span>
                <span class="option-image">
                    <img src="./src/tesoura.png" alt="user choice">
                    <p>Scisor</p>
                </span>
            </div>
        </div>
    </main>
</body>
<script src="./script.js"></script>

</html>
