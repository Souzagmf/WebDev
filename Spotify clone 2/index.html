<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Spotify - clone</title>
</head>

<body>
    <nav>
        <img class="logo-nav" src="https://img.icons8.com/ios-filled/ffffff/50/spotify.png" alt="logo-image">
        <div class="input-nav">
            <div class="home-image">
                <img src="https://img.icons8.com/ios-filled/ffffff/50/home.png" alt="home-image">
            </div>
            <span>
                <div class="input-box">
                    <img src="https://img.icons8.com/ios/acacac/50/search--v1.png" alt="">
                    <input type="text" placeholder="What do you what to play?" />
                </div>
                <div class="separator"></div>
                <img class="browser-image" src="https://img.icons8.com/material-outlined/acacac/48/box--v1.png" alt="">
            </span>
        </div>
        <div class="buttons-nav">
            <button class="button-normal-text">Premium</button>
            <button class="button-normal-text">Suport</button>
            <button class="button-normal-text">Download</button>
            <div class="separator"></div>
            <button class="button-small-text image"><img src="https://img.icons8.com/fluency-systems-regular/acacac/30/download--v1.png" alt="download-image"><p>Install App</p></button>
            <button class="button-small-text sign-up"><p>Sign Up</p></button>
            <button class="button-login"><p>Log In</p></button>
        </div>

    </nav>
    <main>
        <section class="left-container">

        </section>
        <section class="main-container">

        </section>
    </main>
</body>

</html>
